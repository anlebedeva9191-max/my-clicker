<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pro Game Clicker</title>
    <style>
        body { background: #0f0f0f; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; user-select: none; }
        .stats { font-size: 24px; text-shadow: 0 0 10px #00ff41; margin-bottom: 10px; }
        #click-btn { width: 180px; height: 180px; border-radius: 50%; border: 4px solid #00ff41; background: #000; color: #00ff41; font-size: 50px; cursor: pointer; transition: 0.1s; box-shadow: 0 0 20px #00ff41; }
        #click-btn:active { transform: scale(0.9); box-shadow: 0 0 40px #00ff41; }
        .shop { margin-top: 20px; display: grid; gap: 10px; }
        button { padding: 10px; background: #222; color: #00ff41; border: 1px solid #00ff41; cursor: pointer; }
        button:disabled { color: #444; border-color: #444; }
    </style>
</head>
<body>

    <div class="stats">Баланс: <span id="score">0</span> $</div>
    <div class="stats" style="font-size: 16px;">Доход в сек: <span id="cps">0</span></div>
    
    <button id="click-btn">КЛИК</button>

    <div class="shop">
        <button id="upg-click">Сила клика +1 (Цена: <span id="c-cost">10</span>)</button>
        <button id="upg-auto">Авто-ферма +1/сек (Цена: <span id="a-cost">50</span>)</button>
        <button onclick="resetGame()" style="margin-top:20px; color: red; border-color: red;">Сбросить прогресс</button>
    </div>

    <script>
        let score = parseFloat(localStorage.getItem('score')) || 0;
        let clickPower = parseInt(localStorage.getItem('clickPower')) || 1;
        let autoPower = parseInt(localStorage.getItem('autoPower')) || 0;
        let upgClickCost = parseInt(localStorage.getItem('upgClickCost')) || 10;
        let upgAutoCost = parseInt(localStorage.getItem('upgAutoCost')) || 50;

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('cps').innerText = autoPower;
            document.getElementById('c-cost').innerText = upgClickCost;
            document.getElementById('a-cost').innerText = upgAutoCost;
            document.getElementById('upg-click').disabled = score < upgClickCost;
            document.getElementById('upg-auto').disabled = score < upgAutoCost;
        }

        document.getElementById('click-btn').onclick = () => { score += clickPower; save(); updateUI(); };

        document.getElementById('upg-click').onclick = () => {
            if(score >= upgClickCost) {
                score -= upgClickCost; clickPower++; 
                upgClickCost = Math.round(upgClickCost * 1.6);
                save(); updateUI();
            }
        };

        document.getElementById('upg-auto').onclick = () => {
            if(score >= upgAutoCost) {
                score -= upgAutoCost; autoPower++; 
                upgAutoCost = Math.round(upgAutoCost * 1.8);
                save(); updateUI();
            }
        };

        setInterval(() => {
            if(autoPower > 0) { score += autoPower / 10; updateUI(); }
        }, 100);

        function save() {
            localStorage.setItem('score', score);
            localStorage.setItem('clickPower', clickPower);
            localStorage.setItem('autoPower', autoPower);
            localStorage.setItem('upgClickCost', upgClickCost);
            localStorage.setItem('upgAutoCost', upgAutoCost);
        }

        function resetGame() { localStorage.clear(); location.reload(); }
        updateUI();
    </script>
</body>
</html>
