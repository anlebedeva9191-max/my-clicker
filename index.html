<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Online Pro</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #00ff44; --input: #2a2a2a;
        }
        .light-theme {
            --bg: #f0f0f0; --card: #ffffff; --text: #121212; --accent: #008822; --input: #e0e0e0;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; transition: 0.3s; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .window { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 340px; text-align: center; position: relative; }
        .hidden { display: none; }

        /* Интерфейс регистрации */
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: var(--input); color: var(--text); font-size: 16px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }

        /* Игра */
        .score { font-size: 50px; font-weight: bold; margin: 15px 0; color: var(--accent); }
        #click-zone { width: 160px; height: 160px; margin: 20px auto; cursor: pointer; transition: 0.1s; user-select: none; }
        #click-img { width: 100%; height: 100%; object-fit: contain; }
        #click-zone:active { transform: scale(0.92); }

        /* Таблица лидеров */
        .leaderboard { margin-top: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; text-align: left; font-size: 14px; }
        .row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .me { color: var(--accent); font-weight: bold; }

        /* Кнопки настроек */
        .controls { position: absolute; top: -45px; right: 0; display: flex; gap: 10px; }
        .small-btn { background: var(--card); color: var(--text); border: 1px solid var(--input); padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="window">
    <div class="controls">
        <button class="small-btn" onclick="toggleTheme()">🌓</button>
    </div>

    <div id="auth">
        <h2 id="l-reg">Регистрация</h2>
        <input type="text" id="username" placeholder="Твой ник...">
        <select id="lang">
            <option value="ru">Русский</option>
            <option value="en">English</option>
        </select>
        <button class="btn" onclick="initGame()" id="l-btn">ИГРАТЬ</button>
    </div>

    <div id="game" class="hidden">
        <div id="l-hello" style="opacity: 0.7;"></div>
        <div class="score" id="score">0</div>
        
        <div id="click-zone">
            <img src="assets/click.png" id="click-img" alt="Click!">
        </div>
        
        <div class="leaderboard">
            <div id="l-top" style="margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #444;"></div>
            <div id="board"></div>
        </div>
    </div>
</div>

<script>
    const i18n = {
        ru: { reg: "Вход в систему", btn: "ПОГНАЛИ", hello: "Привет", top: "ТОП ИГРОКОВ" },
        en: { reg: "Registration", btn: "START", hello: "Welcome", top: "TOP PLAYERS" }
    };

    let state = { name: "", clicks: 0, lang: "ru" };

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
    }

    function initGame() {
        const name = document.getElementById('username').value;
        if (!name) return alert("Введи ник!");
        
        state.name = name;
        state.lang = document.getElementById('lang').value;

        // Перевод текста
        document.getElementById('l-hello').innerText = `${i18n[state.lang].hello}, ${state.name}`;
        document.getElementById('l-top').innerText = i18n[state.lang].top;

        document.getElementById('auth').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        renderBoard();
    }

    document.getElementById('click-zone').onclick = () => {
        state.clicks++;
        document.getElementById('score').innerText = state.clicks;
        renderBoard();
    };

    function renderBoard() {
        let players = [
            { n: "S1mple", c: 2500 },
            { n: "Buster", c: 1200 },
            { n: state.name, c: state.clicks }
        ].sort((a, b) => b.c - a.c);

        let html = "";
        players.forEach((p, i) => {
            const isMe = p.n === state.name ? "me" : "";
            html += `<div class="row ${isMe}"><span>${i+1}. ${p.n}</span><span>${p.c}</span></div>`;
        });
        document.getElementById('board').innerHTML = html;
    }
</script>

</body>
</html>
