<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MEGA CLICKER v2.0</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .container { margin-top: 50px; }
        #balance { font-size: 48px; color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .click-btn { 
            padding: 20px 50px; font-size: 24px; cursor: pointer; 
            background: #ff4444; border: none; color: white; border-radius: 10px;
            transition: 0.1s; margin: 20px;
        }
        .click-btn:active { transform: scale(0.95); }
        .shop { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .item { 
            background: #333; padding: 15px; border-radius: 8px; width: 200px;
            border: 1px solid #444;
        }
        button.buy { background: #0088ff; border: none; color: white; padding: 10px; cursor: pointer; border-radius: 5px; }
        button.buy:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>MEGA CLICKER v2.0</h1>
    <div id="balance">$0</div>
    <p id="stats">Доход: $0/сек | Сила клика: 1</p>
    
    <button class="click-btn" onclick="doClick()">КЛИК!</button>

    <div class="shop">
        <div class="item">
            <h3>Сильные пальцы</h3>
            <p>Цена: $<span id="cost1">10</span></p>
            <button class="buy" id="btn1" onclick="buyUpgrade('click')">Купить (+1 к клику)</button>
        </div>
        <div class="item">
            <h3>Видеокарта</h3>
            <p>Цена: $<span id="cost2">50</span></p>
            <button class="buy" id="btn2" onclick="buyUpgrade('auto')">Купить (+$2/сек)</button>
        </div>
    </div>
    <br>
    <button onclick="resetGame()" style="background:none; border:1px solid #555; color:#555; cursor:pointer;">Сброс прогресса</button>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('clickerSave')) || {
        money: 0, clickPower: 1, mps: 0, cost1: 10, cost2: 50
    };

    function updateUI() {
        document.getElementById('balance').innerText = '$' + Math.floor(state.money);
        document.getElementById('stats').innerText = `Доход: $${state.mps}/сек | Сила клика: ${state.clickPower}`;
        document.getElementById('cost1').innerText = state.cost1;
        document.getElementById('cost2').innerText = state.cost2;
        
        document.getElementById('btn1').disabled = state.money < state.cost1;
        document.getElementById('btn2').disabled = state.money < state.cost2;
        localStorage.setItem('clickerSave', JSON.stringify(state));
    }

    function doClick() {
        state.money += state.clickPower;
        updateUI();
    }

    function buyUpgrade(type) {
        if (type === 'click' && state.money >= state.cost1) {
            state.money -= state.cost1;
            state.clickPower += 1;
            state.cost1 = Math.floor(state.cost1 * 1.5);
        } else if (type === 'auto' && state.money >= state.cost2) {
            state.money -= state.cost2;
            state.mps += 2;
            state.cost2 = Math.floor(state.cost2 * 1.6);
        }
        updateUI();
    }

    function resetGame() {
        if(confirm("Точно сбросить?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Авто-майнинг раз в секунду
    setInterval(() => {
        state.money += state.mps;
        updateUI();
    }, 1000);

    updateUI();
</script>
</body>
</html>
