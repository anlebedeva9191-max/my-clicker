<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Mega Clicker Online</title>
    <style>
        body { background: #121212; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .window { background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 320px; text-align: center; }
        
        /* Скрытие блоков */
        .hidden { display: none; }

        /* Регистрация и Язык */
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }
        select { padding: 10px; margin-bottom: 15px; background: #222; color: white; border-radius: 5px; }
        .btn { background: #ffcc00; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }

        /* Игра */
        .score { font-size: 40px; margin: 15px 0; color: #ffcc00; }
        #click-me { width: 120px; height: 120px; background: #333; border: 4px solid #ffcc00; border-radius: 50%; margin: 10px auto; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 30px; user-select: none; }
        
        .top-list { margin-top: 20px; background: #252525; padding: 10px; border-radius: 8px; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

<div id="auth-screen" class="window">
    <h2 id="t-reg">Регистрация</h2>
    <input type="text" id="username" placeholder="Твой ник...">
    <select id="lang-select">
        <option value="ru">Русский</option>
        <option value="en">English</option>
    </select>
    <button class="btn" onclick="startGame()" id="t-start">ПОГНАЛИ</button>
</div>

<div id="game-screen" class="window hidden">
    <div id="t-welcome">Привет, <span id="display-name"></span>!</div>
    <div class="score" id="score">0</div>
    <div id="click-me">🔥</div>
    
    <div class="top-list">
        <strong id="t-top">ТОП ИГРОКОВ:</strong>
        <div id="leaderboard"></div>
    </div>
</div>

<script>
    const langData = {
        ru: { reg: "Регистрация", start: "ПОГНАЛИ", welcome: "Привет", top: "ТОП ИГРОКОВ" },
        en: { reg: "Registration", start: "START", welcome: "Hello", top: "TOP PLAYERS" }
    };

    let p = { name: "", clicks: 0, lang: "ru" };

    function startGame() {
        const nameInput = document.getElementById('username').value;
        if (!nameInput) return alert("Введи ник, бро!");
        
        p.name = nameInput;
        p.lang = document.getElementById('lang-select').value;
        
        // Перевод интерфейса
        document.getElementById('t-welcome').innerHTML = `${langData[p.lang].welcome}, <span id="display-name">${p.name}</span>!`;
        document.getElementById('t-top').innerText = langData[p.lang].top;

        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        render();
    }

    document.getElementById('click-me').onclick = () => {
        p.clicks++;
        render();
    };

    function render() {
        document.getElementById('score').innerText = p.clicks;
        
        // Симуляция ТОПа
        let players = [
            { n: "Top_Dog", c: 5000 },
            { n: "Fanta_King", c: 2500 },
            { n: p.name, c: p.clicks }
        ].sort((a, b) => b.c - a.c);

        let html = "";
        players.forEach((player, i) => {
            let style = player.n === p.name ? "color:#ffcc00; font-weight:bold;" : "";
            html += `<div style="${style}">${i+1}. ${player.n} — ${player.c}</div>`;
        });
        document.getElementById('leaderboard').innerHTML = html;
    }
</script>
</body>
</html>
