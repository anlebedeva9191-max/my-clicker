<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Clicker Pro</title>
    <style>
        body { 
            background: #0f0f0f; color: #00ff41; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; overflow: hidden;
            user-select: none;
        }
        .lang-switch { position: absolute; top: 20px; right: 20px; }
        .lang-switch button { background: #222; color: #00ff41; border: 1px solid #00ff41; cursor: pointer; padding: 5px 10px; margin-left: 5px; }
        
        .stats { font-size: 32px; font-weight: bold; text-shadow: 0 0 15px #00ff41; margin-bottom: 5px; }
        .cps-text { font-size: 18px; color: #888; margin-bottom: 25px; }

        #click-btn { 
            width: 200px; height: 200px; border-radius: 50%; border: 6px solid #00ff41; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            color: #00ff41; font-size: 40px; font-weight: bold; cursor: pointer; 
            transition: transform 0.05s, box-shadow 0.1s; 
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2); outline: none;
        }
        #click-btn:active { transform: scale(0.92); box-shadow: 0 0 50px #00ff41; }

        .shop { margin-top: 30px; display: flex; flex-direction: column; gap: 12px; width: 300px; }
        .upgrade-btn { 
            padding: 12px; background: #1a1a1a; color: #00ff41; 
            border: 1px solid #333; cursor: pointer; border-radius: 8px;
            display: flex; justify-content: space-between; transition: 0.2s;
        }
        .upgrade-btn:hover:not(:disabled) { border-color: #00ff41; background: #222; }
        .upgrade-btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: #444; color: #666; }

        .floating-text {
            position: absolute; pointer-events: none; font-weight: bold;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button onclick="changeLang('ru')">RU</button>
        <button onclick="changeLang('en')">EN</button>
    </div>

    <div class="stats"><span id="txt-bal">Баланс</span>: <span id="score">0</span> $</div>
    <div class="cps-text"><span id="txt-cps">Доход</span>: <span id="cps">0</span> /sec</div>
    
    <button id="click-btn">CLICK</button>

    <div class="shop">
        <button id="upg-click" class="upgrade-btn">
            <span id="txt-upg-c">Сила клика</span>
            <span id="c-cost">10</span>
        </button>
        <button id="upg-auto" class="upgrade-btn">
            <span id="txt-upg-a">Авто-ферма</span>
            <span id="a-cost">50</span>
        </button>
        <button onclick="resetGame()" style="background: none; border: none; color: #555; cursor: pointer; margin-top: 10px; font-size: 12px;">Reset Data</button>
    </div>

    <script>
        // Данные
        let score = parseFloat(localStorage.getItem('score')) || 0;
        let clickPower = parseInt(localStorage.getItem('clickPower')) || 1;
        let autoPower = parseInt(localStorage.getItem('autoPower')) || 0;
        let upgClickCost = parseInt(localStorage.getItem('upgClickCost')) || 10;
        let upgAutoCost = parseInt(localStorage.getItem('upgAutoCost')) || 50;

        const translations = {
            ru: { bal: "Баланс", cps: "Доход", upgc: "Сила клика +1", upga: "Авто-ферма +1" },
            en: { bal: "Balance", cps: "Income", upgc: "Click Power +1", upga: "Auto-Farm +1" }
        };

        function changeLang(lang) {
            localStorage.setItem('lang', lang);
            document.getElementById('txt-bal').innerText = translations[lang].bal;
            document.getElementById('txt-cps').innerText = translations[lang].cps;
            document.getElementById('txt-upg-c').innerText = translations[lang].upgc;
            document.getElementById('txt-upg-a').innerText = translations[lang].upga;
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('cps').innerText = autoPower;
            document.getElementById('c-cost').innerText = upgClickCost + " $";
            document.getElementById('a-cost').innerText = upgAutoCost + " $";
            document.getElementById('upg-click').disabled = score < upgClickCost;
            document.getElementById('upg-auto').disabled = score < upgAutoCost;
        }

        // Логика клика
        document.getElementById('click-btn').onclick = (e) => {
            score += clickPower;
            spawnText(e);
            save();
            updateUI();
        };

        function spawnText(e) {
            const t = document.createElement('div');
            t.className = 'floating-text';
            t.innerText = "+" + clickPower;
            t.style.left = e.pageX + "px";
            t.style.top = e.pageY + "px";
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 800);
        }

        // Апгрейды
        document.getElementById('upg-click').onclick = () => {
            if(score >= upgClickCost) {
                score -= upgClickCost; clickPower++;
                upgClickCost = Math.round(upgClickCost * 1.6);
                save(); updateUI();
            }
        };

        document.getElementById('upg-auto').onclick = () => {
            if(score >= upgAutoCost) {
                score -= upgAutoCost; autoPower++;
                upgAutoCost = Math.round(upgAutoCost * 1.8);
                save(); updateUI();
            }
        };

        // Авто-майнинг
        setInterval(() => {
            if(autoPower > 0) {
                score += autoPower / 10;
                updateUI();
            }
        }, 100);

        function save() {
            localStorage.setItem('score', score);
            localStorage.setItem('clickPower', clickPower);
            localStorage.setItem('autoPower', autoPower);
            localStorage.setItem('upgClickCost', upgClickCost);
            localStorage.setItem('upgAutoCost', upgAutoCost);
        }

        function resetGame() {
            if(confirm("Сбросить всё?")) { localStorage.clear(); location.reload(); }
        }

        // Старт
        const startLang = localStorage.getItem('lang') || 'ru';
        changeLang(startLang);
        updateUI();
    </script>
</body>
</html>
