<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Clicker</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { background: #222; border: 2px solid #333; padding: 20px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,0,0.1); width: 400px; text-align: center; }
        
        /* Индикатор онлайн */
        .status { font-size: 12px; text-align: right; margin-bottom: 10px; color: #00ff00; text-shadow: 0 0 5px #00ff00; }
        .status::before { content: "● "; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* Главная кнопка */
        #clickBtn { background: #333; border: 2px solid #00ff00; color: #00ff00; padding: 20px; font-size: 18px; cursor: pointer; border-radius: 5px; width: 100%; transition: 0.1s; }
        #clickBtn:active { transform: scale(0.95); background: #00ff00; color: #000; }

        /* Полоска опыта */
        .xp-bar { width: 100%; height: 10px; background: #111; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        #xp-fill { width: 0%; height: 100%; background: #00ff00; transition: 0.3s; box-shadow: 0 0 10px #00ff00; }

        /* Таблица лидеров (TAB-стиль) */
        .leaderboard { margin-top: 20px; text-align: left; font-size: 14px; border-top: 1px solid #333; padding-top: 10px; }
        .player-row { display: flex; justify-content: space-between; padding: 3px 5px; }
        .me { background: rgba(255, 165, 0, 0.2); color: #ffa500; font-weight: bold; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="status">SERVER ONLINE</div>
    <h2 id="nameDisplay">Hacker_Bro</h2>
    <div id="rankDisplay">Rank: Script Kiddie (Lvl 1)</div>
    
    <div class="xp-bar"><div id="xp-fill"></div></div>
    
    <button id="clickBtn">ИНИЦИИРОВАТЬ КЛИК</button>
    
    <div class="leaderboard" id="leaderboard">
        </div>
</div>

<script>
    // База данных
    let p = {
        clicks: Number(localStorage.getItem('h_c')) || 0,
        lvl: Number(localStorage.getItem('h_l')) || 1,
        xp: Number(localStorage.getItem('h_x')) || 0
    };

    let players = [
        { n: "G-Man", c: 10000, l: 80 },
        { n: "Pro_Gmodder", c: 5000, l: 45 },
        { n: "Fanta_Fan", c: 1200, l: 12 },
        { n: "Hacker_Bro", c: p.clicks, l: p.lvl }
    ];

    const btn = document.getElementById('clickBtn');
    
    btn.onclick = () => {
        p.clicks++;
        p.xp += 50;

        if(p.xp >= 1000) {
            p.lvl++;
            p.xp = 0;
            alert("LEVEL UP! Твой ранг повышен!");
        }
        
        saveAndRender();
    };

    function saveAndRender() {
        localStorage.setItem('h_c', p.clicks);
        localStorage.setItem('h_l', p.lvl);
        localStorage.setItem('h_x', p.xp);

        // Обновляем данные в топе
        let me = players.find(x => x.n === "Hacker_Bro");
        me.c = p.clicks;
        me.l = p.lvl;
        players.sort((a, b) => b.c - a.c);

        // UI
        document.getElementById('rankDisplay').innerText = `Rank: Level ${p.lvl}`;
        document.getElementById('xp-fill').style.width = (p.xp / 10) + "%";
        
        let html = "";
        players.forEach((player, i) => {
            let isMe = player.n === "Hacker_Bro" ? "me" : "";
            html += `<div class="player-row ${isMe}">
                        <span>${i+1}. ${player.n}</span>
                        <span>Lvl ${player.l} | ${player.c}</span>
                    </div>`;
        });
        document.getElementById('leaderboard').innerHTML = html;
    }

    saveAndRender();
</script>

</body>
</html>
