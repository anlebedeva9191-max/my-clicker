<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Clicker Pro</title>
    <style>
        /* Переменные для тем */
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #ffcc00; --input: #2a2a2a;
        }
        .light-theme {
            --bg: #f0f205; --card: #ffffff; --text: #121212; --accent: #ff6600; --input: #eeeeee;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; transition: 0.3s; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .window { background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }

        /* Красивые инпуты */
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 12px; border: none; background: var(--input); color: var(--text); font-size: 16px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }

        /* Стили игры */
        .score { font-size: 54px; font-weight: 800; margin: 20px 0; color: var(--accent); text-shadow: 0 0 20px rgba(255,204,0,0.2); }
        #click-me { 
            width: 140px; height: 140px; background: var(--accent); 
            border-radius: 40px; margin: 20px auto; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 50px; user-select: none; transition: 0.1s;
            box-shadow: 0 8px 0 #cca300;
        }
        #click-me:active { transform: translateY(4px); box-shadow: 0 4px 0 #cca300; }

        /* Топ игроков */
        .top-list { margin-top: 25px; background: rgba(0,0,0,0.1); padding: 15px; border-radius: 16px; text-align: left; }
        .player-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Кнопка смены темы */
        .theme-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body class="dark-theme">

<div class="theme-toggle" onclick="toggleTheme()">🌓</div>

<div id="auth-screen" class="window">
    <h2 id="t-reg">Регистрация</h2>
    <input type="text" id="username" placeholder="Твой ник...">
    <select id="lang-select">
        <option value="ru">Русский</option>
        <option value="en">English</option>
    </select>
    <button class="btn" onclick="startGame()" id="t-start">ПОГНАЛИ</button>
</div>

<div id="game-screen" class="window hidden">
    <div id="t-welcome" style="font-weight: 600; opacity: 0.8;"></div>
    <div class="score" id="score">0</div>
    <div id="click-me">🥤</div>
    
    <div class="top-list">
        <strong id="t-top"></strong>
        <div id="leaderboard"></div>
    </div>
</div>

<script>
    const langData = {
        ru: { reg: "Вход в игру", start: "ИГРАТЬ", welcome: "Привет", top: "ТОП ЛИДЕРОВ" },
        en: { reg: "Sign In", start: "PLAY", welcome: "Welcome", top: "LEADERBOARD" }
    };

    let p = { name: "", clicks: 0, lang: "ru" };

    function toggleTheme() {
        document.body.classList.toggle('light-theme');
    }

    function startGame() {
        const nameInput = document.getElementById('username').value;
        if (!nameInput) return alert("Бро, имя введи!");
        
        p.name = nameInput;
        p.lang = document.getElementById('lang-select').value;
        
        document.getElementById('t-welcome').innerText = `${langData[p.lang].welcome}, ${p.name}!`;
        document.getElementById('t-top').innerText = langData[p.lang].top;

        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        render();
    }

    document.getElementById('click-me').onclick = () => {
        p.clicks++;
        render();
    };

    function render() {
        document.getElementById('score').innerText = p.clicks;
        let players = [
            { n: "Top_Player", c: 5000 },
            { n: "S1mple", c: 2500 },
            { n: p.name, c: p.clicks }
        ].sort((a, b) => b.c - a.c);

        let html = "";
        players.forEach((player, i) => {
            let isMe = player.n === p.name ? "color: var(--accent); font-weight: bold;" : "";
            html += `<div class="player-row" style="${isMe}">
                        <span>${i+1}. ${player.n}</span>
                        <span>${player.c}</span>
                    </div>`;
        });
        document.getElementById('leaderboard').innerHTML = html;
    }
</script>
</body>
</html>
