<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Clicker</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-card { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; border: 1px solid #333; }
        
        /* Счетчик и Лвл */
        .score { font-size: 48px; font-weight: bold; margin: 10px 0; color: #ffcc00; }
        .level-info { font-size: 18px; color: #aaa; margin-bottom: 20px; }

        /* Кнопка Клика */
        #click-zone { width: 150px; height: 150px; background: radial-gradient(#ffcc00, #ff9900); border-radius: 50%; margin: 0 auto 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 40px; box-shadow: 0 0 20px rgba(255, 204, 0, 0.4); transition: 0.1s; user-select: none; }
        #click-zone:active { transform: scale(0.9); box-shadow: 0 0 5px rgba(255, 204, 0, 0.2); }

        /* Таблица ТОП (Tab-стиль) */
        .top-list { background: #252525; border-radius: 10px; padding: 10px; text-align: left; margin-top: 20px; }
        .top-title { font-size: 14px; color: #666; text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .player-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #333; font-size: 14px; }
        .player-item.current { color: #ffcc00; font-weight: bold; }
        .online-tag { color: #00ff00; font-size: 10px; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="level-info">Уровень: <span id="lvl">1</span></div>
    <div class="score" id="score">0</div>
    
    <div id="click-zone">💰</div>
    
    <div class="top-list">
        <div class="top-title"><span>ТОП ИГРОКОВ</span> <span class="online-tag">● ONLINE</span></div>
        <div id="leaderboard">
            </div>
    </div>
</div>

<script>
    // Загрузка данных
    let data = {
        clicks: Number(localStorage.getItem('c_val')) || 0,
        lvl: Number(localStorage.getItem('l_val')) || 1
    };

    // Фейковый онлайн-топ (для вайба)
    let players = [
        { name: "S1mple_Fan", clicks: 15000, lvl: 150 },
        { name: "Fanta_Monster", clicks: 7500, lvl: 75 },
        { name: "Bro_Gamer", clicks: 3200, lvl: 32 },
        { name: "Я (Ты)", clicks: data.clicks, lvl: data.lvl }
    ];

    const zone = document.getElementById('click-zone');
    
    zone.onclick = () => {
        data.clicks++;
        
        // Каждые 50 кликов — новый уровень
        if (data.clicks % 50 === 0) {
            data.lvl++;
        }
        
        render();
    };

    function render() {
        // Сохранение
        localStorage.setItem('c_val', data.clicks);
        localStorage.setItem('l_val', data.lvl);

        // Обновление цифр
        document.getElementById('score').innerText = data.clicks;
        document.getElementById('lvl').innerText = data.lvl;

        // Обновление топа
        let me = players.find(x => x.name === "Я (Ты)");
        me.clicks = data.clicks;
        me.lvl = data.lvl;
        players.sort((a, b) => b.clicks - a.clicks);

        let html = "";
        players.forEach((p, i) => {
            let isMe = p.name === "Я (Ты)" ? "current" : "";
            html += `<div class="player-item ${isMe}">
                        <span>${i+1}. ${p.name}</span>
                        <span>Lvl ${p.lvl} | ${p.clicks}</span>
                    </div>`;
        });
        document.getElementById('leaderboard').innerHTML = html;
    }

    render();
</script>

</body>
</html>
